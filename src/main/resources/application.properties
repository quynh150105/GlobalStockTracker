spring.application.name=GlobalStockTracker
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name= com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.signerKey=${JWT_SIGNERKEY}
spring.security.oauth2.client.registration.google.client-id=${OAUTH_CLIENTID}
spring.security.oauth2.client.registration.google.client-secret=${OAUTH_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile